<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background: dark rounded square -->
  <rect width="64" height="64" rx="12" fill="#0d1117"/>

  <!-- Database cylinder — body -->
  <rect x="14" y="18" width="36" height="22" fill="#0c2d4e"/>

  <!-- Database — top ellipse (bright cyan) -->
  <ellipse cx="32" cy="18" rx="18" ry="5.5" fill="#38bdf8"/>
  <!-- Highlight on top ellipse -->
  <ellipse cx="32" cy="17" rx="12" ry="3" fill="#7dd3fc" opacity="0.35"/>

  <!-- Database — middle ring -->
  <ellipse cx="32" cy="29" rx="18" ry="5.5" fill="none"
           stroke="#38bdf8" stroke-width="1.2" opacity="0.45"/>

  <!-- Database — bottom ellipse -->
  <ellipse cx="32" cy="40" rx="18" ry="5.5" fill="#075985"/>

  <!-- Export arrow — shaft -->
  <line x1="32" y1="44" x2="32" y2="55"
        stroke="#00e5ff" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Export arrow — head -->
  <polyline points="23,49 32,58 41,49"
            fill="none" stroke="#00e5ff"
            stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Subtle glow ring around arrowhead -->
  <polyline points="23,49 32,58 41,49"
            fill="none" stroke="#00e5ff"
            stroke-width="7" stroke-linecap="round" stroke-linejoin="round"
            opacity="0.12"/>
</svg>
